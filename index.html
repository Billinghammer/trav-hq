<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>TRAV HQ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <style>
    body { background: #030712; font-family: system-ui, -apple-system, sans-serif; }
    .kanban-col { min-width: 260px; max-width: 300px; flex-shrink: 0; }
    .kanban-scroll { overflow-x: auto; }
    .task-card { cursor: pointer; transition: transform 0.1s; }
    .task-card:hover { transform: translateY(-1px); }
    .sortable-ghost { opacity: 0.4; }
    .sortable-drag { opacity: 0; }
    .tab-btn.active { border-bottom: 2px solid #3b82f6; color: #f8fafc; }
    .tab-btn { border-bottom: 2px solid transparent; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    #modal-overlay, #add-modal-overlay, #contact-modal-overlay, #deal-modal-overlay { transition: opacity 0.2s; }
    #task-modal { transition: transform 0.25s, opacity 0.25s; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.8s linear infinite; display: inline-block; }
    #toast { transition: transform 0.3s, opacity 0.3s; }
  </style>
</head>
<body class="min-h-screen text-gray-100">

<!-- Login overlay -->
<div id="login-overlay" class="fixed inset-0 bg-gray-950 z-50 flex items-center justify-center" style="display:none!important">
  <div class="bg-gray-900 border border-gray-700 rounded-2xl p-8 w-full max-w-sm mx-4">
    <h1 class="text-xl font-bold text-white mb-1">TRAV HQ</h1>
    <p class="text-gray-500 text-sm mb-6">Personal AI Operating System</p>
    <input id="pw-input" type="password" placeholder="Access token" autocomplete="current-password"
      class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5 text-sm text-white outline-none focus:border-blue-500 mb-3">
    <button onclick="doLogin()" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-2.5 rounded-lg text-sm font-semibold">Enter</button>
    <div id="login-err" class="text-red-400 text-xs mt-2 text-center"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-800 text-white text-sm px-4 py-2 rounded-lg shadow-lg z-50 opacity-0 translate-y-4 pointer-events-none"></div>

<!-- Header -->
<header class="bg-gray-900 border-b border-gray-800 sticky top-0 z-30">
  <div class="flex items-center justify-between px-4 py-3">
    <div>
      <h1 class="text-lg font-bold tracking-tight">TRAV HQ</h1>
      <div id="last-updated" class="text-xs text-gray-500">Loading...</div>
    </div>
    <div class="flex gap-2">
      <button onclick="refreshAll()" class="bg-blue-600 hover:bg-blue-500 text-white text-xs px-3 py-1.5 rounded-lg font-medium">&#x21BB; Refresh</button>
      <button onclick="logout()" class="bg-gray-700 hover:bg-gray-600 text-gray-300 text-xs px-3 py-1.5 rounded-lg font-medium">Out</button>
    </div>
  </div>
  <div class="flex border-t border-gray-800 overflow-x-auto">
    <button class="tab-btn active text-sm text-gray-400 px-5 py-2.5 whitespace-nowrap" onclick="switchTab('tasks',this)">Tasks</button>
    <button class="tab-btn text-sm text-gray-400 px-5 py-2.5 whitespace-nowrap" onclick="switchTab('contacts',this)">Contacts</button>
    <button class="tab-btn text-sm text-gray-400 px-5 py-2.5 whitespace-nowrap" onclick="switchTab('deals',this)">Deals</button>
    <button class="tab-btn text-sm text-gray-400 px-5 py-2.5 whitespace-nowrap" onclick="switchTab('dump',this)">Brain Dump</button>
  </div>
</header>

<!-- TAB: Tasks -->
<div id="tab-tasks" class="tab-panel active">
  <div class="px-4 py-3 border-b border-gray-800 flex items-center gap-2">
    <button onclick="openAddTask()" class="bg-blue-600 hover:bg-blue-500 text-white text-sm px-3 py-1.5 rounded-lg font-medium">+ Task</button>
    <span id="tasks-summary" class="text-xs text-gray-500"></span>
  </div>
  <div class="kanban-scroll p-4">
    <div class="flex gap-4 min-w-max">
      <div class="kanban-col">
        <div class="bg-red-950 border border-red-800 rounded-t-xl px-3 py-2 flex items-center justify-between mb-2">
          <span class="text-red-400 text-xs font-bold uppercase">Overdue</span>
          <span id="badge-overdue" class="bg-red-900 text-red-300 text-xs px-2 py-0.5 rounded-full">0</span>
        </div>
        <div id="col-overdue" class="bg-gray-900 border border-gray-800 border-t-0 rounded-b-xl min-h-[200px] p-2 space-y-2" data-col="overdue"></div>
      </div>
      <div class="kanban-col">
        <div class="bg-gray-900 border border-gray-800 rounded-t-xl px-3 py-2 flex items-center justify-between mb-2">
          <span class="text-white text-xs font-bold uppercase">Today</span>
          <span id="badge-today" class="bg-gray-700 text-gray-300 text-xs px-2 py-0.5 rounded-full">0</span>
        </div>
        <div id="col-today" class="bg-gray-900 border border-gray-800 border-t-0 rounded-b-xl min-h-[200px] p-2 space-y-2" data-col="today"></div>
      </div>
      <div class="kanban-col">
        <div class="bg-gray-900 border border-gray-800 rounded-t-xl px-3 py-2 flex items-center justify-between mb-2">
          <span class="text-white text-xs font-bold uppercase">This Week</span>
          <span id="badge-week" class="bg-gray-700 text-gray-300 text-xs px-2 py-0.5 rounded-full">0</span>
        </div>
        <div id="col-week" class="bg-gray-900 border border-gray-800 border-t-0 rounded-b-xl min-h-[200px] p-2 space-y-2" data-col="week"></div>
      </div>
      <div class="kanban-col">
        <div class="bg-gray-900 border border-gray-800 rounded-t-xl px-3 py-2 flex items-center justify-between mb-2">
          <span class="text-white text-xs font-bold uppercase">This Month</span>
          <span id="badge-month" class="bg-gray-700 text-gray-300 text-xs px-2 py-0.5 rounded-full">0</span>
        </div>
        <div id="col-month" class="bg-gray-900 border border-gray-800 border-t-0 rounded-b-xl min-h-[200px] p-2 space-y-2" data-col="month"></div>
      </div>
      <div class="kanban-col">
        <div class="bg-gray-900 border border-gray-800 rounded-t-xl px-3 py-2 flex items-center justify-between mb-2">
          <span class="text-white text-xs font-bold uppercase">Backlog</span>
          <span id="badge-backlog" class="bg-gray-700 text-gray-300 text-xs px-2 py-0.5 rounded-full">0</span>
        </div>
        <div id="col-backlog" class="bg-gray-900 border border-gray-800 border-t-0 rounded-b-xl min-h-[200px] p-2 space-y-2" data-col="backlog"></div>
      </div>
    </div>
  </div>
</div>

<!-- TAB: Contacts -->
<div id="tab-contacts" class="tab-panel p-4">
  <div class="flex gap-2 mb-3 flex-wrap">
    <input id="contact-search" type="search" placeholder="Search contacts..." class="flex-1 min-w-0 bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-100 outline-none focus:border-blue-500">
    <button onclick="openAddContact()" class="bg-blue-600 hover:bg-blue-500 text-white text-sm px-3 py-2 rounded-lg font-medium whitespace-nowrap">+ Contact</button>
    <div class="flex gap-1 flex-wrap">
      <button class="tier-btn active text-xs px-2 py-1 rounded bg-gray-700 text-white border border-gray-600" data-tier="all">All</button>
      <button class="tier-btn text-xs px-2 py-1 rounded bg-gray-900 text-gray-400 border border-gray-700" data-tier="A+">A+</button>
      <button class="tier-btn text-xs px-2 py-1 rounded bg-gray-900 text-gray-400 border border-gray-700" data-tier="A">A</button>
      <button class="tier-btn text-xs px-2 py-1 rounded bg-gray-900 text-gray-400 border border-gray-700" data-tier="B">B</button>
      <button class="tier-btn text-xs px-2 py-1 rounded bg-gray-900 text-gray-400 border border-gray-700" data-tier="C">C</button>
    </div>
  </div>
  <div id="contacts-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
    <div class="text-gray-500 text-sm col-span-2 py-8 text-center">Search to find contacts</div>
  </div>
</div>

<!-- TAB: Deals -->
<div id="tab-deals" class="tab-panel p-4">
  <div class="flex items-center justify-between mb-4">
    <button onclick="openAddDeal()" class="bg-blue-600 hover:bg-blue-500 text-white text-sm px-3 py-1.5 rounded-lg font-medium">+ Deal</button>
  </div>
  <div id="deals-list" class="space-y-6">
    <div class="flex justify-center py-10"><span class="spinner text-blue-500 text-2xl">&#x27F3;</span></div>
  </div>
</div>

<!-- TAB: Brain Dump -->
<div id="tab-dump" class="tab-panel p-4">
  <div class="mb-4">
    <textarea id="dump-input" rows="3" placeholder="Drop anything here — idea, task, follow-up, random thought. AIRE will sort it out." class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-sm text-gray-100 outline-none focus:border-blue-500 resize-none placeholder-gray-600"></textarea>
    <div class="flex items-center justify-between mt-2">
      <span class="text-xs text-gray-600">Cmd+Enter to submit</span>
      <div class="flex gap-2">
        <button onclick="runDisposition()" id="dispose-btn" class="bg-gray-700 hover:bg-gray-600 text-gray-300 text-sm px-3 py-1.5 rounded-lg font-medium">⚡ Disposition All</button>
        <button onclick="submitDump()" class="bg-blue-600 hover:bg-blue-500 text-white text-sm px-4 py-1.5 rounded-lg font-medium">Drop It</button>
      </div>
    </div>
  </div>
  <div id="dump-list" class="space-y-3">
    <div class="flex justify-center py-10"><span class="spinner text-blue-500 text-2xl">&#x27F3;</span></div>
  </div>
</div>

<!-- Task Edit Modal -->
<div id="modal-overlay" class="fixed inset-0 bg-black/60 z-40 hidden opacity-0" onclick="closeModal()"></div>
<div id="task-modal" class="fixed z-50 bg-gray-900 border border-gray-700 rounded-2xl shadow-2xl p-5 bottom-0 left-0 right-0 translate-y-full opacity-0 md:bottom-auto md:left-1/2 md:-translate-x-1/2 md:top-20 md:w-full md:max-w-lg md:translate-y-0 hidden">
  <div class="flex items-center justify-between mb-4">
    <h2 class="font-semibold text-white">Edit Task</h2>
    <button onclick="closeModal()" class="text-gray-500 hover:text-white text-xl leading-none">&times;</button>
  </div>
  <div class="space-y-3">
    <input id="modal-title" type="text" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white outline-none focus:border-blue-500" placeholder="Task title">
    <div class="grid grid-cols-2 gap-2">
      <div>
        <label class="text-xs text-gray-500 mb-1 block">Priority</label>
        <select id="modal-priority" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white outline-none">
          <option value="urgent">🔴 Urgent</option>
          <option value="high">🟡 High</option>
          <option value="normal" selected>⚪ Normal</option>
          <option value="low">⬇ Low</option>
        </select>
      </div>
      <div>
        <label class="text-xs text-gray-500 mb-1 block">Status</label>
        <select id="modal-status" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white outline-none">
          <option value="pending">Pending</option>
          <option value="in_progress">In Progress</option>
          <option value="done">Done</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>
    </div>
    <div>
      <label class="text-xs text-gray-500 mb-1 block">Due Date</label>
      <input id="modal-due" type="date" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white outline-none focus:border-blue-500">
    </div>
    <div>
      <label class="text-xs text-gray-500 mb-1 block">Assignee</label>
      <div class="flex gap-2">
        <button id="assign-travis" onclick="setAssignee('travis')" class="flex-1 py-2 rounded-lg text-sm font-medium border border-blue-600 bg-blue-600/20 text-blue-300">Travis</button>
        <button id="assign-mark" onclick="setAssignee('mark')" class="flex-1 py-2 rounded-lg text-sm font-medium border border-gray-700 bg-gray-800 text-gray-400">Mark</button>
      </div>
    </div>
  </div>
  <div class="flex gap-2 mt-5">
    <button onclick="saveTask()" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white py-2 rounded-lg text-sm font-semibold">Save</button>
    <button onclick="markDone()" class="flex-1 bg-green-700 hover:bg-green-600 text-white py-2 rounded-lg text-sm font-semibold">✓ Done</button>
    <button onclick="assignToMark()" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white py-2 rounded-lg text-sm font-semibold">→ Mark</button>
  </div>
</div>

<!-- Add Task Modal -->
<div id="add-modal-overlay" class="fixed inset-0 bg-black/60 z-40 hidden" onclick="closeAddModal()"></div>
<div id="add-task-modal" class="fixed z-50 bg-gray-900 border border-gray-700 rounded-2xl shadow-2xl p-5 bottom-0 left-0 right-0 translate-y-full md:bottom-auto md:left-1/2 md:-translate-x-1/2 md:top-20 md:w-full md:max-w-lg md:translate-y-0 hidden">
  <div class="flex items-center justify-between mb-4">
    <h2 class="font-semibold text-white">New Task</h2>
    <button onclick="closeAddModal()" class="text-gray-500 hover:text-white text-xl leading-none">&times;</button>
  </div>
  <div class="space-y-3">
    <input id="add-title" type="text" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white outline-none focus:border-blue-500" placeholder="Task title">
    <div class="grid grid-cols-2 gap-2">
      <div>
        <label class="text-xs text-gray-500 mb-1 block">Priority</label>
        <select id="add-priority" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white outline-none">
          <option value="urgent">🔴 Urgent</option>
          <option value="high">🟡 High</option>
          <option value="normal" selected>⚪ Normal</option>
          <option value="low">⬇ Low</option>
        </select>
      </div>
      <div>
        <label class="text-xs text-gray-500 mb-1 block">Due Date</label>
        <input id="add-due" type="date" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white outline-none focus:border-blue-500">
      </div>
    </div>
    <div>
      <label class="text-xs text-gray-500 mb-1 block">Assignee</label>
      <div class="flex gap-2">
        <button id="add-assign-travis" onclick="setAddAssignee('travis')" class="flex-1 py-2 rounded-lg text-sm font-medium border border-blue-600 bg-blue-600/20 text-blue-300">Travis</button>
        <button id="add-assign-mark" onclick="setAddAssignee('mark')" class="flex-1 py-2 rounded-lg text-sm font-medium border border-gray-700 bg-gray-800 text-gray-400">Mark</button>
      </div>

  </div>
  <button onclick="submitNewTask()" class="w-full mt-5 bg-blue-600 hover:bg-blue-500 text-white py-2 rounded-lg text-sm font-semibold">Create Task</button>
</div>

<!-- Add Contact Modal -->
<div id="contact-modal-overlay" class="fixed inset-0 bg-black/60 z-40 hidden" onclick="closeAddContact()"></div>
<div id="add-contact-modal" class="fixed z-50 bg-gray-900 border border-gray-700 rounded-2xl shadow-2xl p-5 bottom-0 left-0 right-0 translate-y-full md:bottom-auto md:left-1/2 md:-translate-x-1/2 md:top-20 md:w-full md:max-w-lg md:translate-y-0 hidden">
  <div class="flex items-center justify-between mb-4">

    <button onclick="closeAddContact()" class="text-gray-500 hover:text-white text-xl leading-none">&times;</button>

    <div class="grid grid-cols-2 gap-2">

<!-- Add Deal Modal -->
<div id="deal-modal-overlay" class="fixed inset-0 bg-black/60 z-40 hidden" onclick="closeAddDeal()"></div>
<div id="add-deal-modal" class="fixed z-50 bg-gray-900 border border-gray-700 rounded-2xl shadow-2xl p-5 bottom-0 left-0 right-0 translate-y-full md:bottom-auto md:left-1/2 md:-translate-x-1/2 md:top-20 md:w-full md:max-w-lg md:translate-y-0 hidden">
  <div class="flex items-center justify-between mb-4">
    <h2 class="font-semibold text-white">New Deal</h2>
    <button onclick="closeAddDeal()" class="text-gray-500 hover:text-white text-xl leading-none">&times;</button>
  </div>
  <div class="space-y-3">
    <div>
      <label class="text-xs text-gray-500 mb-1 block">Property Address</label>

      <div>
        <label class="text-xs text-gray-500 mb-1 block">Type</label>

          <option value="listing">🏠 Listing</option>
          <option value="buyer">🤝 Buyer</option>
          <option value="development">🏗 Development</option>
        </select>
      </div>
      <div>
        <label class="text-xs text-gray-500 mb-1 block">Stage</label>
        <select id="d-stage" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white outline-none">
          <option value="active">Active</option>

<script>
const API_BASE = 'https://zxmhpgfiuhgcjqwyjuxz.supabase.co/functions/v1/dashboard';
const DISPOSITIONER_BASE = 'https://zxmhpgfiuhgcjqwyjuxz.supabase.co/functions/v1/brain-dump-dispositioner';
let TOKEN = localStorage.getItem('trav_token') || '';
let allTasks = [];
let currentModalTaskId = null;
let modalAssignee = 'travis';
let addAssignee = 'travis';
let contactTier = 'all';
let contactDebounce = null;

// ── Auth ──────────────────────────────────────────────────
function checkAuth() {
  if (!TOKEN) {
    document.getElementById('login-overlay').style.cssText = 'display:flex!important';
    document.getElementById('pw-input').focus();
  }
}

async function doLogin() {
  const pw = document.getElementById('pw-input').value;
  try {
    const r = await fetch(API_BASE, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    });
    if (r.ok) {
      TOKEN = pw;
      localStorage.setItem('trav_token', pw);
      document.getElementById('login-overlay').style.cssText = 'display:none!important';
      loadTasks();
    } else {
      document.getElementById('login-err').textContent = 'Invalid token';
    }
  } catch (e) {
    document.getElementById('login-err').textContent = 'Connection error';
  }
}

document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// ── Utilities ─────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.remove('opacity-0', 'translate-y-4');
  el.classList.add('opacity-100', 'translate-y-0');
  if (isError) el.classList.add('bg-red-800'); else el.classList.remove('bg-red-800');
  setTimeout(() => {
    el.classList.remove('opacity-100', 'translate-y-0');
    el.classList.add('opacity-0', 'translate-y-4');
  }, 3000);
}

async function api(method, route, body) {
  try {
    const opts = {
      method,
      headers: { 'Authorization': 'Bearer ' + TOKEN }
    };
    if (body !== undefined) {
      opts.headers['Content-Type'] = 'application/json';
      opts.body = JSON.stringify(body);
    }
    const r = await fetch(API_BASE + route, opts);
    if (r.status === 401) { logout(); throw new Error('Session expired'); }
    if (!r.ok) { const e = await r.json(); throw new Error(e.error || r.statusText); }
    return await r.json();
  } catch (err) {
    toast(err.message || 'Error', true);
    throw err;
  }
}

function todayStr() { return new Date().toISOString().split('T')[0]; }
function fridayStr() {
  const d = new Date();
  const day = d.getDay();
  const diff = day === 0 ? 5 : day <= 5 ? 5 - day : 6;
  d.setDate(d.getDate() + diff);
  return d.toISOString().split('T')[0];
}
function endOfMonthStr() {
  const d = new Date();
  return new Date(d.getFullYear(), d.getMonth() + 1, 0).toISOString().split('T')[0];
}
function colForDue(due) {
  if (!due) return 'backlog';
  const d = due.split('T')[0];
  const today = todayStr();
  if (d < today) return 'overdue';
  if (d === today) return 'today';
  if (d <= fridayStr()) return 'week';
  if (d <= endOfMonthStr()) return 'month';
  return 'backlog';
}
function dueDateForCol(col) {
  if (col === 'today') return todayStr();
  if (col === 'week') return fridayStr();
  if (col === 'month') return endOfMonthStr();
  return null;
}
function timeAgo(ts) {
  const diff = Date.now() - new Date(ts).getTime();
  const h = Math.floor(diff / 3600000);
  if (h < 1) return 'just now';
  if (h < 24) return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}

function priorityBadge(p) {
  const map = { urgent: 'bg-red-900 text-red-300', high: 'bg-amber-900 text-amber-300', normal: 'bg-gray-700 text-gray-300', low: 'bg-gray-800 text-gray-500' };
  const labels = { urgent: '🔴 Urgent', high: '🟡 High', normal: '⚪ Normal', low: '⬇ Low' };
  return '<span class="text-xs px-1.5 py-0.5 rounded ' + (map[p] || map.normal) + '">' + (labels[p] || p) + '</span>';
}
function assigneeBadge(a) {
  if (a === 'mark') return '<span class="text-xs px-1.5 py-0.5 rounded bg-green-900 text-green-300">Mark</span>';
  return '<span class="text-xs px-1.5 py-0.5 rounded bg-blue-900 text-blue-300">Travis</span>';
}
function taskCard(t) {
  const today = todayStr();
  const due = t.due_date ? t.due_date.split('T')[0] : null;
  const isOverdue = due && due < today;
  const dueColor = isOverdue ? 'text-red-400' : 'text-gray-500';
  const tags = Array.isArray(t.tags) && t.tags.length
    ? t.tags.map(tg => '<span class="text-xs px-1.5 py-0.5 rounded bg-gray-800 text-gray-400">' + esc(tg) + '</span>').join('')
    : '';
  const tagsHtml = tags ? '<div class="flex flex-wrap gap-1">' + tags + '</div>' : '';
  const dueHtml = due ? '<div class="text-xs ' + dueColor + '">' + due + (isOverdue ? ' · overdue' : '') + '</div>' : '';
  return '<div class="task-card bg-gray-800 border border-gray-700 rounded-xl p-3 space-y-2 select-none"'
    + ' data-id="' + esc(t.id) + '"'
    + ' onclick="openTaskModal(\'' + esc(t.id) + '\')">'
    + '<div class="text-sm font-medium text-white leading-snug">' + esc(t.title) + '</div>'
    + '<div class="flex flex-wrap gap-1">' + priorityBadge(t.priority || 'normal') + assigneeBadge(t.assigned_to || 'travis') + '</div>'
    + tagsHtml + dueHtml + '</div>';
}
function renderKanban() {
  const cols = { overdue: [], today: [], week: [], month: [], backlog: [] };
  for (const t of allTasks) cols[colForDue(t.due_date)].push(t);
  const colIds = { overdue: 'col-overdue', today: 'col-today', week: 'col-week', month: 'col-month', backlog: 'col-backlog' };
  const badgeIds = { overdue: 'badge-overdue', today: 'badge-today', week: 'badge-week', month: 'badge-month', backlog: 'badge-backlog' };
  for (const [key, tasks] of Object.entries(cols)) {
    document.getElementById(colIds[key]).innerHTML = tasks.length
      ? tasks.map(taskCard).join('')
      : '<div class="text-xs text-gray-600 py-4 text-center">Empty</div>';
    document.getElementById(badgeIds[key]).textContent = tasks.length;
  }
  document.getElementById('tasks-summary').textContent = allTasks.length + ' open' + (cols.overdue.length ? ' · ' + cols.overdue.length + ' overdue' : '');
  initSortable();
}
function initSortable() {
  ['col-today', 'col-week', 'col-month', 'col-backlog'].forEach(id => {
    const el = document.getElementById(id);
    if (!el._sortable) {
      el._sortable = new Sortable(el, {
        group: 'tasks', animation: 150,
        ghostClass: 'sortable-ghost', dragClass: 'sortable-drag',
        onEnd(evt) {
          const taskId = evt.item.dataset.id;
          const toCol = evt.to.dataset.col;
          if (!taskId || !toCol) return;
          patchTask({ id: taskId, due_date: dueDateForCol(toCol) }).then(updated => {
            if (updated) {
              const idx = allTasks.findIndex(t => String(t.id) === String(taskId));
              if (idx >= 0) allTasks[idx] = Object.assign({}, allTasks[idx], updated);
            }
          });
        }
      });
    }
  });
  const od = document.getElementById('col-overdue');
  if (!od._sortable) od._sortable = new Sortable(od, { group: { name: 'tasks', put: false }, animation: 150, ghostClass: 'sortable-ghost' });
}

  try {
    allTasks = await api('GET', '?api=tasks');
    renderKanban();
    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString('en-US', { timeStyle: 'short' }) + ' ET';

}

async function dumpAction(id, status) {
  try {
    await api('PATCH', '?api=dump', { id, status });
    const el = document.getElementById('dump-' + id);
    if (el) { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; setTimeout(() => el.remove(), 300); }
    toast('Item ' + status);
  } catch (_) {}
}

async function refreshAll() {
  await loadTasks();
  const activeTab = document.querySelector('.tab-panel.active');
  if (activeTab) {
    if (activeTab.id === 'tab-deals') loadDeals();
    if (activeTab.id === 'tab-dump') loadDump();
  }
}

// ── Init ──────────────────────────────────────────────────
checkAuth();
if (TOKEN) loadTasks();
</script>
